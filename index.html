<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="assets/favicon/hb-flower.jpg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a0a0a" id="themeColor" />
  <title>Sean Endo</title>
  <meta name="description" content="Music by Sean Endo." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero" id="hero" role="banner">
    <nav class="hero__socials" id="socials" aria-label="Social links"></nav>
    <h1 class="hero__name" id="artistName"></h1>
  </header>

  <main class="discography">
    <div class="album-list" id="albumList" aria-live="polite"></div>
  </main>

  <footer class="site-footer" id="siteFooter">
    <p class="footer__credits" id="footerCredits"></p>
    <div class="footer__row">
      <p class="footer__copyright" id="footerCopyright"></p>
      <div class="footer__socials" id="footerSocials"></div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
